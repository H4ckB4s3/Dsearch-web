<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="We create a bridge from Web2 to Web3. No configuration/installation needed. HNS.TO enables you to visit HNS websites by appending .hns.to to any HNS domain. And ETH.LIMO enables you to visit ENS websites by appending .limo to any ENS domain.">
    <title>Dsearch - Resolving ENS & HNS domains with their web2 Bridge</title>
    <link rel="stylesheet" href="/css/style.css">

    <!-- iOS Icons -->
    <link rel="apple-touch-icon" sizes="180x180" href="/img/apple-touch-icon.png">
    <link rel="apple-touch-icon" sizes="152x152" href="/img/apple-touch-icon-152x152.png">
    <link rel="apple-touch-icon" sizes="144x144" href="/img/apple-touch-icon-144x144.png">
    <link rel="apple-touch-icon" sizes="120x120" href="/img/apple-touch-icon-120x120.png">
    <link rel="apple-touch-icon" sizes="114x114" href="/img/apple-touch-icon-114x114.png">
    <link rel="apple-touch-icon" sizes="76x76" href="/img/apple-touch-icon-76x76.png">
    <link rel="apple-touch-icon" sizes="72x72" href="/img/apple-touch-icon-72x72.png">
    <link rel="apple-touch-icon" sizes="60x60" href="/img/apple-touch-icon-60x60.png">
    <link rel="apple-touch-icon" sizes="57x57" href="/img/apple-touch-icon-57x57.png">

    <!-- Android Icons -->
    <link rel="icon" type="image/png" sizes="192x192" href="/img/android-chrome-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/img/android-chrome-512x512.png">
    
    <!-- Favicon for browsers -->
    <link rel="icon" type="image/png" sizes="32x32" href="/img/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/img/favicon-16x16.png">

    <!-- Manifest for Android -->
    <link rel="manifest" href="site.webmanifest">
    <meta name="theme-color" content="#ffffff">
    
    <!-- iOS App specific meta tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Dsearch - Resolving ENS & HNS domains with their web2 Bridge">

    <!-- Open Graph Meta Tags for Facebook and other Social Media -->
    <meta property="og:title" content="Dsearch">
    <meta property="og:description" content="Dsearch - Resolving ENS & HNS domains with their web2 Bridge">
    <meta property="og:image" content="https://dsearch.org/img/og-image-1200x630.png">
    <meta property="og:url" content="https://dsearch.org">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Dsearch">

    <!-- Twitter Card Meta Tags -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Dsearch">
    <meta name="twitter:description" content="Dsearch - Resolving ENS & HNS domains">
    <meta name="twitter:image" content="https://dsearch.org/img/twitter-image-1200x675.png">
    <meta name="twitter:site" content="@h4ckb4s3">

    <!-- Schema.org Markup for Google+ -->
    <meta itemprop="name" content="Dsearch">
    <meta itemprop="description" content="Dsearch - Resolving ENS & HNS domains with their web2 Bridge">
    <meta itemprop="image" content="https://dsearch.org/img/google-image-800x800.png">
</head>
<body>
    <!-- Theme Switcher - Simple toggle -->
    <div class="theme-switcher" id="themeSwitcher">
        <button class="theme-button" id="themeButton" aria-label="Toggle theme">
            <!-- Moon icon (default for dark mode) -->
            <svg class="moon-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
            </svg>
            <!-- Sun icon (hidden by default, shown in light mode) -->
            <svg class="sun-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: none;">
                <circle cx="12" cy="12" r="5"/>
                <line x1="12" y1="1" x2="12" y2="3"/>
                <line x1="12" y1="21" x2="12" y2="23"/>
                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                <line x1="1" y1="12" x2="3" y2="12"/>
                <line x1="21" y1="12" x2="23" y2="12"/>
                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
            </svg>
        </button>
    </div>

    <div class="main">
        <div class="logo-container">
            <h1 class="dsearch-logo">DSEARCH</h1>
            <div class="subtitle">ENS &amp; HNS Bridge</div>
        </div>

        <div class="search-card">
            <form id="hns-form" class="search-box">
                <input type="text" id="hns-input" class="search-input" placeholder="Enter a ENS or HNS domain" autofocus>
                <button type="submit" class="search-button">Go</button>
            </form>
        </div>

        <p class="slogan">Want to use Dsearch in your Chromium Browser?</p>
        <a href="https://chromewebstore.google.com/detail/dsearch-extension/icjnmgficmgalidlpdkbcgjppolcpjja" class="download-button">Install Extension</a>
    </div>

    <footer>
        <p>&copy; <a href="/" id="yearLink">Dsearch.org</a> - <a href="https://ens.domains" target="_blank">ENS</a> & <a href="https://handshake.org" target="_blank">HNS</a> Bridge.</p>
    </footer>

    <script src="/js/query.js"></script>
    <script>
        // Get the current year
        const currentYear = new Date().getFullYear();
        document.getElementById('yearLink').textContent = currentYear + ' Dsearch.org';

        // --- Theme Toggle ---
        const themeButton = document.getElementById('themeButton');
        const moonIcon = document.querySelector('.moon-icon');
        const sunIcon = document.querySelector('.sun-icon');
        const body = document.body;

        function getPreferredTheme() {
            const stored = localStorage.getItem('dsearch-theme');
            if (stored) return stored;
            return window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
        }

        function setTheme(theme) {
            if (theme === 'light') {
                body.classList.add('light-mode');
                moonIcon.style.display = 'none';
                sunIcon.style.display = 'block';
            } else {
                body.classList.remove('light-mode');
                moonIcon.style.display = 'block';
                sunIcon.style.display = 'none';
            }
            localStorage.setItem('dsearch-theme', theme);
        }

        function toggleTheme() {
            const currentTheme = body.classList.contains('light-mode') ? 'light' : 'dark';
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            setTheme(newTheme);
        }

        // Initialize theme
        const initialTheme = getPreferredTheme();
        setTheme(initialTheme);

        // Theme button click
        themeButton.addEventListener('click', toggleTheme);

        // Listen for OS theme changes
        window.matchMedia('(prefers-color-scheme: light)').addEventListener('change', (e) => {
            if (!localStorage.getItem('dsearch-theme')) {
                setTheme(e.matches ? 'light' : 'dark');
            }
        });
    </script>
</body>
</html>
